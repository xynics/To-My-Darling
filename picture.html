<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whom I Have ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ff5d7a,#c3002f,#7a001d);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Floating Hearts */

.hearts{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
}

.hearts span{
    position:absolute;
    bottom:-50px;
    color:#ffd1dc;
    font-size:25px;
    animation:floatUp linear infinite;
    opacity:.8;
}

.hearts span:nth-child(1){left:5%;animation-duration:8s;}
.hearts span:nth-child(2){left:20%;animation-duration:10s;}
.hearts span:nth-child(3){left:35%;animation-duration:7s;}
.hearts span:nth-child(4){left:50%;animation-duration:11s;}
.hearts span:nth-child(5){left:65%;animation-duration:9s;}
.hearts span:nth-child(6){left:80%;animation-duration:8s;}
.hearts span:nth-child(7){left:92%;animation-duration:12s;}

@keyframes floatUp{
    from{
        transform:translateY(0) scale(.5);
        opacity:0;
    }
    30%{
        opacity:1;
    }
    to{
        transform:translateY(-110vh) scale(1.4);
        opacity:0;
    }
}

/* Container */

.container{
    width:900px;
    max-width:95%;
    height:760px;
    position:relative;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    border-radius:30px;
    border:2px solid rgba(255,255,255,.2);
    box-shadow:0 20px 50px rgba(0,0,0,.35);
}

h1{
    text-align:center;
    color:white;
    padding:25px;
    font-size:40px;
    letter-spacing:2px;
}

/* Photos */

/* ===== PHOTO GALLERY ===== */

.gallery{
    width:90%;
    max-width:850px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,180px);
    gap:20px;
    justify-items:center;
    align-items:center;
}

/* Photo Box */

.photo{
    width:170px;
    height:170px;
    transition:.4s ease;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    border:8px solid white;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.35);
    transition:.4s;
}

.photo:hover{
    transform:scale(1.12) rotate(0deg);
    z-index:100;
}

.photo:hover img{
    box-shadow:0 20px 40px rgba(0,0,0,.45);
}

/* Layout */

.p1{
    grid-column:1;
    grid-row:1;
    transform:rotate(-8deg);
}

.p2{
    grid-column:2;
    grid-row:1;
    transform:rotate(6deg);
}

.p3{
    grid-column:3;
    grid-row:1;
    transform:rotate(-6deg);
}

/* Center Photo (Bigger) */

.p4{
    grid-column:2;
    grid-row:2;
    width:220px;
    height:220px;
    transform:rotate(0deg);
}

.p5{
    grid-column:1;
    grid-row:3;
    transform:rotate(8deg);
}

.p6{
    grid-column:2;
    grid-row:3;
    transform:rotate(-5deg);
}

.p7{
    grid-column:3;
    grid-row:3;
    transform:rotate(7deg);
}

/* Back Button */

.back{
    position:absolute;
    bottom:20px;
    right:25px;
    text-decoration:none;
    color:white;
    background:#ff2f5d;
    padding:12px 25px;
    border-radius:30px;
    transition:.3s;
}

.back:hover{
    background:#ff6f91;
    transform:translateY(-4px);
.container::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:30px;
    background:
    radial-gradient(circle at top,#ffffff33,transparent 60%);
    pointer-events:none;
}
}

</style>

</head>
<body>

<div class="hearts">
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
</div>

<div class="container">

<h1>❤️ My Beautiful Girl ❤️</h1>

<div class="gallery">

<a href="1.jpg" target="_blank" class="photo p1">
    <img src="1.jpg">
</a>

<a href="4.jpg" target="_blank" class="photo p2">
    <img src="4.jpg">
</a>

<a href="3.jpg" target="_blank" class="photo p3">
    <img src="3.jpg">
</a>

<a href="2.jpg" target="_blank" class="photo p4">
    <img src=".jpg">
</a>

<a href="5.jpg" target="_blank" class="photo p5">
    <img src="5.jpg">
</a>

<a href="6.jpg" target="_blank" class="photo p6">
    <img src="6.jpg">
</a>

<a href="7.jpg" target="_blank" class="photo p7">
    <img src="7.jpg">
</a>

</div>

<a href="index.html" class="back">← Back to Letter</a>

</div>

</body>
</html>
