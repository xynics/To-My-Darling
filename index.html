<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#d8efff,#7ebcff);
    overflow:hidden;
}

/* Floating hearts */
body::before{
    content:"💙 ✿ 💙 ✿ 💙 ✿ 💙";
    position:absolute;
    width:100%;
    text-align:center;
    font-size:28px;
    top:-50px;
    animation:fall 12s linear infinite;
    opacity:.5;
}

@keyframes fall{
    from{transform:translateY(-100px);}
    to{transform:translateY(110vh);}
}

.container{
    width:90%;
    max-width:950px;
    height:75vh;
    position:relative;
}

input{
    display:none;
}

.envelope{
    position:relative;
    width:100%;
    height:100%;
    background:#4a9cff;
    border-radius:12px;
    cursor:pointer;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.3);
}

/* Letter */
.letter{
    position:absolute;
    width:90%;
    height:88%;
    left:5%;
    top:8%;
    background:white;
    border-radius:12px;
    padding:40px;
    text-align:center;
    color:#2858a8;
    overflow:auto;

    /* Hidden initially */
    opacity:0;
    visibility:hidden;
    transform:translateY(80px);
    transition:all 0.8s ease;
    z-index:1;
}

.letter h1{
    color:#3b8dff;
    margin-bottom:20px;
}

.letter p{
    font-size:18px;
    line-height:1.8;
}

/* Flap */
.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#2d78df;
    clip-path:polygon(0 0,100% 0,50% 52%);
    transform-origin:top;
    transition:1s;
    z-index:2;
}

input:checked + label .flap{
    transform:rotateX(180deg);
}

input:checked + label .letter{
    opacity:1;
    visibility:visible;
    transform:translateY(-60px);
    transition:all 0.8s ease 0.6s;
}

/* Buttons */

.buttons{
    margin-top:35px;
}

.btn{
    display:inline-block;
    padding:14px 28px;
    margin:10px;
    text-decoration:none;
    color:white;
    background:#4a9cff;
    border-radius:40px;
    transition:.35s;
    font-weight:bold;
}

.btn:hover{
    background:#2567d8;
    transform:translateY(-5px) scale(1.08);
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.openText{
    position:absolute;
    bottom:-45px;
    width:100%;
    text-align:center;
    color:#1f4ea3;
    font-size:22px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.1);
    }
}
/* Blue Confetti */
.confetti{
    position:fixed;
    top:-20px;
    width:10px;
    height:18px;
    pointer-events:none;
    z-index:999;
    animation:confettiFall linear forwards;
}

@keyframes confettiFall{
    0%{
        transform:translateY(-20px) rotate(0deg);
        opacity:1;
    }
    100%{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">

<input type="checkbox" id="open">

<label for="open">

<div class="envelope">

<div class="flap"></div>

<div class="letter">

<h1>💙 Just For You 💙</h1>

<p>
HAPPY 3RD MONTHSARY DARLING KO!!!
Thank you for consistent prayer for me, little by little nakakabalik na ako kay Lord.
Salamat sa patuloy na love and care mo for me, kahit madalas may climate change sa'yo.
I just want you to now that every moment I spent with you becomes a memory I never want to forget.
You bring peace to my heart and joy to my soul.
No matter where life takes us,
I hope this little letter reminds you how special you truly are.
</p>

<div class="buttons">


<a href="picture.html" class="btn">
Photo Gallery
</a>

<button class="btn"
onclick="alert('You make my world brighter every single day. 💙')">
Secret Message
</button>

</div>

</div>

</div>

</label>

<div class="openText">
💙 Click the Envelope to Open 💙
</div>

</div>
<script>
const colors = [
    "#4A90E2",
    "#5DAEFF",
    "#87CEFA",
    "#1E90FF",
    "#6EC6FF",
    "#BFE9FF",
    "#7DB9FF"
];

let raining = false;

function createConfetti(){

    if(!raining) return;

    const c = document.createElement("div");
    c.className = "confetti";

    c.style.left = Math.random()*100 + "vw";

    const size = Math.random()*10 + 6;
    c.style.width = size + "px";
    c.style.height = size*1.8 + "px";

    c.style.background =
        colors[Math.floor(Math.random()*colors.length)];

    c.style.borderRadius =
        Math.random()>.5 ? "50%" : "2px";

    c.style.animationDuration =
        (Math.random()*3 + 3) + "s";

    document.body.appendChild(c);

    setTimeout(()=>c.remove(),6000);
}

setInterval(createConfetti,120);

document.getElementById("open").addEventListener("change",function(){
    raining = this.checked;
});
</script>

</body>
</html>
